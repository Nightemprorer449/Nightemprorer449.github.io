<!DOCTYPE html>
<html>
<head>

    <style>
        body {

            background: #eef7ff;
            text-align: center;
            margin: 0;
        }

        header {
            background: #0066cc;
            color: white;
            padding: 20px;

        .product {

            padding: 15px;
            border-radius: 10px;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Aussie Fishing Gear</h1>
    <p>Quality Fishing Equipment</p>
</header>

<div class="product">
    <h2>Fishing Rod</h2>
    <p>$79.99</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h2>Fishing Reel</h2>
    <p>$59.99</p>
    <button>Buy Now</button>
</div>

</body>
</html>
